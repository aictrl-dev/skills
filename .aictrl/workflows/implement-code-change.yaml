schemaVersion: aictrl/workflow/v2
name: implement-code-change
label: Implement code change
description: >-
  Validate one GitHub issue, pause for approval at the repository's exact base
  revision, then implement and open a merge-ready pull request. The workflow
  never merges or deploys. It runs one read-only planning pass and one
  implementation pass, each bounded by an explicit 10-minute task timeout,
  with no automatic retries or loops. Cost is structurally capped at those two
  task executions; the provider-dependent dollar cost is reported on the run.
  External side effects are limited to a feature branch, commits, test runs,
  and one pull request in the authorized connected repository.
category: code-change
icon: git-pull-request
failureStrategy: fail-fast

parameters:
  - name: repository
    label: Repository
    type: repository
    description: GitHub repository in owner/name form. It must be connected to the AICtrl organization.
    required: true
  - name: issue-id
    label: Issue ID
    type: number
    description: Positive GitHub issue number in the selected repository.
    required: true
    validation: { min: 1 }

nodes:
  - id: validate-and-plan
    label: Validate issue and plan
    type: task
    skill: implement-code-change@1.0.0
    taskType: general
    prompt: >-
      Perform only the read-only discovery and planning portion of the attached
      implement-code-change skill. The workspace starts empty. Use the provided
      GITHUB_TOKEN to inspect the connected repository and issue. Verify that the
      issue exists, classify it as a bug or story/change, identify its acceptance
      criteria, and resolve the repository's default branch to an exact 40-character
      commit SHA. Do not create a branch, edit files, commit, push, comment, open a
      pull request, merge, or deploy. If the issue is invalid, ambiguous enough to
      change the outcome, or outside the repository, fail with an actionable reason.
      Finish with exactly one JSON object and no Markdown fence using these keys:
      revision, issue_type, and plan_summary.
    parameters:
      - name: repository
        label: Repository
        type: repository
        required: true
      - name: issue-id
        label: Issue ID
        type: number
        required: true
        validation: { min: 1 }
    inputs:
      repository: { from: input, name: repository }
      issue-id: { from: input, name: issue-id }
    outputs:
      revision: string
      issue_type: string
      plan_summary: string
    timeoutMinutes: 10
    retry: { maxRetries: 0, backoffMs: 0 }

  - id: implement-and-open-pr
    label: Implement and open pull request
    type: task
    skill: implement-code-change@1.0.0
    taskType: general
    prompt: >-
      Execute the attached implement-code-change skill for the supplied issue.
      The workspace starts empty. Clone only the connected repository with the
      provided GITHUB_TOKEN. Before editing, verify that its default branch still
      points to base-revision; fail closed if it has moved. Work from that exact
      revision. Implement every acceptance criterion, use the bug or story path
      appropriate to the issue, run focused and blast-radius checks, review the
      final diff, push one feature branch, and open or update one merge-ready pull
      request. Never merge, deploy, alter repository settings, or broaden scope.
      This is a single 10-minute implementation pass with no automatic retry loop.
      For successful work, finish with exactly one JSON object and no Markdown
      fence using these keys: base_revision, revision, pull_request_url, checks,
      and status. revision must be the exact 40-character pull-request head SHA;
      checks must be a JSON array of command/status summaries; status must be
      merge-ready. If the work cannot be completed, fail the task with an
      actionable terminal reason instead of returning a success-shaped JSON
      object with status failed.
    parameters:
      - name: repository
        label: Repository
        type: repository
        required: true
      - name: issue-id
        label: Issue ID
        type: number
        required: true
        validation: { min: 1 }
      - name: base-revision
        label: Approved base revision
        type: string
        required: true
    inputs:
      repository: { from: input, name: repository }
      issue-id: { from: input, name: issue-id }
      base-revision: { from: node, node: validate-and-plan, extract: "$.revision" }
    outputs:
      base_revision: string
      revision: string
      pull_request_url: string
      checks: json
      status: string
    timeoutMinutes: 10
    retry: { maxRetries: 0, backoffMs: 0 }

edges:
  - { from: validate-and-plan, to: implement-and-open-pr }

qualityGates:
  - afterWave: 1
    type: manual
    description: >-
      Confirm the validated plan and exact base revision before AICtrl creates a
      branch, changes code, pushes commits, or opens a pull request.
